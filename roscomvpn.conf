[General]
bypass-system = true
ipv6 = false
prefer-ipv6 = false
private-ip-answer = true
dns-direct-system = false
dns-fallback-system = true
dns-direct-fallback-proxy = true

# Яндекс DNS для прямого трафика (работает везде в РФ)
